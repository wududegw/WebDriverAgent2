name: Build WDA IPA

on:
  workflow_dispatch:  # Chạy thủ công trên GitHub Actions

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout WebDriverAgent
        uses: actions/checkout@v4
        with:
          repository: appium/WebDriverAgent
          submodules: true

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Download Dependencies (Carthage/SPM)
        run: |
          # Chạy script bootstrap để lấy các dependencies cần thiết (nếu có)
          if [ -f "./Scripts/bootstrap.sh" ]; then
            ./Scripts/bootstrap.sh -d
          fi

      - name: Build WDA
        run: |
          xcodebuild \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            clean build \
            CONFIGURATION_BUILD_DIR=$PWD/build

          # Đóng gói thư mục build app thành file IPA
          mkdir -p Payload
          cp -r build/WebDriverAgentRunner-Runner.app Payload/
          zip -r WebDriverAgentRunner.ipa Payload/

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgentRunner-IPA
          path: WebDriverAgentRunner.ipa
          retention-days: 7
